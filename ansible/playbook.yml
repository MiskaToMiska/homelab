---
- name: Config for whole homelab setup
  hosts: homelab
  become: true
  vars:
    target_user: "{{ lookup('ini', 'USER type=properties file=../.env') }}"
    appdata_dir: "{{ lookup('ini', 'APPDATA_DIR type=properties file=../.env') }}"
    repo_dir: "{{ lookup('ini', 'REPO_DIR type=properties file=../.env') }}"
  tasks:
    - name: Install needed dependencies
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - git
          - ncdu
        state: present
        update_cache: true

    - name: Making a dir for keyrings
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download official gpg key for docker
      get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add official docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install docker + compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Add user to docker group
      user:
        name: "{{ target_user }}"
        groups: docker
        append: true

    - name: Make appdata directory
      file:
        path: "/home/{{ target_user }}/appdata"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"

    - name: Make appdata directories for every app
      file:
        path: "{{ appdata_dir }}/{{ item }}"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"
      loop:
        - pihole/etc
        - pihole/dnsmasq
        - caddy/data
        - caddy/config
        # - jellyfin
        # - swing-music
        # - retrom
        # - grafana
        # - paperless
        # - prometheus
        # - stirling-pdf
        # - kuma
    - name: Clone github repo
      git:
        repo: "https://github.com/MiskaToMiska/homelab.git"
        dest: "{{ repo_dir }}"
        version: main

    - name: Docker compose core stack
      community.docker.docker_compose_v2:
        project_src: "{{ repo_dir }}/stacks/core"
        env_files: "{{ repo_dir }}/.env"
        build: always
        state: present
