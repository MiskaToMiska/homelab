services:
  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: stirling-pdf
    ports:
      - '8099:8080'
    volumes:
      - ${APPDATA_DIR}/stirling-pdf/tessdata:/usr/share/tessdata  # OCR language files
      - ${APPDATA_DIR}/stirling-pdf/configs:/configs               # Settings & database
      - ${APPDATA_DIR}/stirling-pdf/logs:/logs                     # Application logs
      - ${APPDATA_DIR}/stirling-pdf/pipeline:/pipeline             # Automation configs
    environment:
      - SECURITY_ENABLELOGIN=false
      - LANGS=pl_PL
    restart: unless-stopped
