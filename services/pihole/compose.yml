services:
  pihole:
    container_name: pihole
    image: docker.io/pihole/pihole:latest
    dns:
      - 1.1.1.1
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8081:80"  # To mówi: 8081 na zewnątrz kieruj do 80 wewnątrz
    environment:
      TZ: 'Europe/Warsaw'
      WEBPASSWORD: 'TwojeHaslo'
      WEB_PORT: '8081'  # DODAJ TĘ LINIĘ - to wymusza zmianę wewnątrz Pi-hole
    volumes:
      - ./etc-pihole:/etc/pihole
      - ./etc-dnsmasq.d:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN
    restart: always
